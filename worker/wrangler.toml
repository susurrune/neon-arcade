name = "neon-arcade-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "neon-arcade-db"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "GAME_BUCKET"
bucket_name = "neon-arcade-games"

[vars]
JWT_SECRET = "change-me-to-a-secure-secret-in-production"
