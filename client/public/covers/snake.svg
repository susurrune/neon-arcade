<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="120" height="120" fill="url(#bg)" rx="8"/>
  <!-- 蛇身体 - 像素风格 -->
  <g filter="url(#glow)">
    <!-- 蛇头 -->
    <rect x="20" y="30" width="8" height="8" fill="#39ff14"/>
    <!-- 蛇身 -->
    <rect x="28" y="30" width="8" height="8" fill="#2ecc40"/>
    <rect x="36" y="30" width="8" height="8" fill="#2ecc40"/>
    <rect x="44" y="30" width="8" height="8" fill="#2ecc40"/>
    <rect x="44" y="38" width="8" height="8" fill="#2ecc40"/>
    <rect x="44" y="46" width="8" height="8" fill="#2ecc40"/>
    <rect x="52" y="46" width="8" height="8" fill="#2ecc40"/>
    <rect x="60" y="46" width="8" height="8" fill="#1e8c1e"/>
    <!-- 蛇眼睛 -->
    <rect x="22" y="32" width="2" height="2" fill="#fff"/>
    <rect x="22" y="34" width="2" height="2" fill="#fff"/>
    <!-- 食物 -->
    <rect x="80" y="70" width="8" height="8" fill="#ff2e88" filter="url(#glow)"/>
    <rect x="92" y="50" width="8" height="8" fill="#ffe600" filter="url(#glow)"/>
    <!-- 障碍物 -->
    <rect x="70" y="80" width="8" height="8" fill="#3a3a5c"/>
    <rect x="78" y="80" width="8" height="8" fill="#3a3a5c"/>
  </g>
  <!-- 霓虹边框 -->
  <rect x="2" y="2" width="116" height="116" fill="none" stroke="#39ff14" stroke-width="2" rx="8" opacity="0.6"/>
  <!-- 标题 -->
  <text x="60" y="105" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="8" fill="#39ff14" filter="url(#glow)">SNAKE</text>
</svg>