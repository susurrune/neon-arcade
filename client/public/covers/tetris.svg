<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="120" height="120" fill="url(#bg)" rx="8"/>
  <!-- 方块 - 像素风格 -->
  <g filter="url(#glow)">
    <!-- I方块 -->
    <rect x="15" y="20" width="8" height="8" fill="#00f0ff"/>
    <rect x="23" y="20" width="8" height="8" fill="#00f0ff"/>
    <rect x="31" y="20" width="8" height="8" fill="#00f0ff"/>
    <rect x="39" y="20" width="8" height="8" fill="#00f0ff"/>
    <!-- T方块 -->
    <rect x="55" y="25" width="8" height="8" fill="#b026ff"/>
    <rect x="63" y="25" width="8" height="8" fill="#b026ff"/>
    <rect x="71" y="25" width="8" height="8" fill="#b026ff"/>
    <rect x="63" y="33" width="8" height="8" fill="#b026ff"/>
    <!-- L方块 -->
    <rect x="85" y="30" width="8" height="8" fill="#ff6b6b"/>
    <rect x="85" y="38" width="8" height="8" fill="#ff6b6b"/>
    <rect x="85" y="46" width="8" height="8" fill="#ff6b6b"/>
    <rect x="93" y="46" width="8" height="8" fill="#ff6b6b"/>
    <!-- 已放置的方块 -->
    <rect x="20" y="55" width="8" height="8" fill="#4ecdc4" opacity="0.8"/>
    <rect x="28" y="55" width="8" height="8" fill="#4ecdc4" opacity="0.8"/>
    <rect x="36" y="55" width="8" height="8" fill="#ffe600" opacity="0.8"/>
    <rect x="44" y="55" width="8" height="8" fill="#ffe600" opacity="0.8"/>
    <rect x="52" y="55" width="8" height="8" fill="#ff2e88" opacity="0.8"/>
    <rect x="20" y="63" width="8" height="8" fill="#39ff14" opacity="0.8"/>
    <rect x="28" y="63" width="8" height="8" fill="#39ff14" opacity="0.8"/>
    <rect x="36" y="63" width="8" height="8" fill="#a855f7" opacity="0.8"/>
    <!-- 消除线效果 -->
    <line x1="15" y1="59" x2="105" y2="59" stroke="#fff" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- 霓虹边框 -->
  <rect x="2" y="2" width="116" height="116" fill="none" stroke="#a855f7" stroke-width="2" rx="8" opacity="0.6"/>
  <!-- 标题 -->
  <text x="60" y="105" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="7" fill="#a855f7" filter="url(#glow)">TETRIS</text>
</svg>