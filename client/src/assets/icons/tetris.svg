<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Grid background -->
  <rect x="8" y="4" width="48" height="56" fill="#1a1a2e" stroke="#3a3a5c" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="8" y1="18" x2="56" y2="18" stroke="#252540" stroke-width="0.5"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="#252540" stroke-width="0.5"/>
  <line x1="8" y1="46" x2="56" y2="46" stroke="#252540" stroke-width="0.5"/>
  <line x1="24" y1="4" x2="24" y2="60" stroke="#252540" stroke-width="0.5"/>
  <line x1="40" y1="4" x2="40" y2="60" stroke="#252540" stroke-width="0.5"/>
  <!-- I-piece (cyan) -->
  <rect x="10" y="6" width="6" height="6" fill="#00f0ff" rx="1"/>
  <rect x="18" y="6" width="6" height="6" fill="#00f0ff" rx="1"/>
  <rect x="26" y="6" width="6" height="6" fill="#00f0ff" rx="1"/>
  <rect x="34" y="6" width="6" height="6" fill="#00f0ff" rx="1"/>
  <!-- T-piece (purple) -->
  <rect x="18" y="20" width="6" height="6" fill="#b026ff" rx="1"/>
  <rect x="26" y="20" width="6" height="6" fill="#b026ff" rx="1"/>
  <rect x="34" y="20" width="6" height="6" fill="#b026ff" rx="1"/>
  <rect x="26" y="14" width="6" height="6" fill="#b026ff" rx="1"/>
  <!-- L-piece (orange/pink) -->
  <rect x="42" y="34" width="6" height="6" fill="#ff2d95" rx="1"/>
  <rect x="42" y="42" width="6" height="6" fill="#ff2d95" rx="1"/>
  <rect x="42" y="50" width="6" height="6" fill="#ff2d95" rx="1"/>
  <rect x="50" y="50" width="6" height="6" fill="#ff2d95" rx="1"/>
  <!-- Completed row glow -->
  <rect x="8" y="48" width="48" height="8" fill="#39ff14" opacity="0.15"/>
  <rect x="10" y="50" width="6" height="6" fill="#39ff14" rx="1" opacity="0.7"/>
  <rect x="18" y="50" width="6" height="6" fill="#ffe600" rx="1" opacity="0.7"/>
  <rect x="26" y="50" width="6" height="6" fill="#b026ff" rx="1" opacity="0.7"/>
  <rect x="34" y="50" width="6" height="6" fill="#00f0ff" rx="1" opacity="0.7"/>
  <!-- Border glow -->
  <rect x="8" y="4" width="48" height="56" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
</svg>
