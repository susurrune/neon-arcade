<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Snake body - coiled pixel style -->
  <rect x="8" y="48" width="6" height="6" fill="#39ff14" rx="1"/>
  <rect x="14" y="48" width="6" height="6" fill="#39ff14" rx="1"/>
  <rect x="14" y="42" width="6" height="6" fill="#39ff14" rx="1"/>
  <rect x="20" y="42" width="6" height="6" fill="#39ff14" rx="1"/>
  <rect x="26" y="42" width="6" height="6" fill="#39ff14" rx="1"/>
  <rect x="26" y="36" width="6" height="6" fill="#39ff14" rx="1"/>
  <rect x="32" y="36" width="6" height="6" fill="#39ff14" rx="1"/>
  <rect x="38" y="36" width="6" height="6" fill="#39ff14" rx="1"/>
  <rect x="38" y="30" width="6" height="6" fill="#39ff14" rx="1"/>
  <!-- Snake head -->
  <rect x="44" y="30" width="8" height="8" fill="#39ff14" rx="1"/>
  <rect x="44" y="30" width="8" height="8" fill="#39ff14" rx="1" opacity="0.6"/>
  <!-- Eyes -->
  <rect x="46" y="32" width="2" height="2" fill="#0f0f1a"/>
  <rect x="50" y="32" width="2" height="2" fill="#0f0f1a"/>
  <!-- Tongue -->
  <rect x="52" y="34" width="4" height="1" fill="#ff2d95"/>
  <rect x="55" y="33" width="1" height="1" fill="#ff2d95"/>
  <rect x="55" y="35" width="1" height="1" fill="#ff2d95"/>
  <!-- Apple -->
  <rect x="12" y="20" width="6" height="6" fill="#ff2d95" rx="1"/>
  <rect x="14" y="18" width="2" height="3" fill="#39ff14" rx="1"/>
  <!-- Ground -->
  <rect x="4" y="56" width="56" height="2" fill="#3a3a5c" rx="1"/>
</svg>
