<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Starfield -->
  <rect x="4" y="4" width="1" height="1" fill="#fff" opacity="0.4"/>
  <rect x="20" y="8" width="1" height="1" fill="#fff" opacity="0.3"/>
  <rect x="50" y="6" width="1" height="1" fill="#fff" opacity="0.5"/>
  <rect x="36" y="14" width="1" height="1" fill="#fff" opacity="0.3"/>
  <rect x="58" y="20" width="1" height="1" fill="#fff" opacity="0.4"/>
  <rect x="10" y="18" width="1" height="1" fill="#fff" opacity="0.3"/>
  <!-- Player ship -->
  <polygon points="32,44 26,54 32,52 38,54" fill="#00f0ff"/>
  <polygon points="32,44 28,52 32,50 36,52" fill="#00f0ff" opacity="0.8"/>
  <!-- Ship cockpit -->
  <rect x="31" y="46" width="2" height="3" fill="#0f0f1a" rx="0.5"/>
  <!-- Engine glow -->
  <rect x="30" y="54" width="4" height="2" fill="#ff2d95" rx="0.5" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="0.3s" repeatCount="indefinite"/>
  </rect>
  <!-- Bullets -->
  <rect x="31" y="38" width="2" height="4" fill="#ffe600" rx="0.5"/>
  <rect x="31" y="30" width="2" height="4" fill="#ffe600" rx="0.5" opacity="0.5"/>
  <!-- Enemy ship 1 -->
  <polygon points="14,10 10,18 18,18" fill="#ff2d95"/>
  <rect x="13" y="12" width="2" height="2" fill="#0f0f1a" rx="0.5"/>
  <!-- Enemy ship 2 -->
  <polygon points="48,16 44,24 52,24" fill="#b026ff"/>
  <rect x="47" y="18" width="2" height="2" fill="#0f0f1a" rx="0.5"/>
  <!-- Enemy ship 3 -->
  <polygon points="30,4 26,12 34,12" fill="#ff2d95" opacity="0.7"/>
  <!-- Explosion particles -->
  <rect x="22" y="20" width="2" height="2" fill="#ffe600" opacity="0.6"/>
  <rect x="18" y="22" width="2" height="2" fill="#ff2d95" opacity="0.4"/>
  <rect x="24" y="24" width="1" height="1" fill="#ffe600" opacity="0.5"/>
</svg>
