<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background buildings (far) -->
  <rect x="4" y="24" width="8" height="36" fill="#1a1a2e"/>
  <rect x="14" y="18" width="6" height="42" fill="#1a1a2e"/>
  <rect x="22" y="28" width="10" height="32" fill="#1a1a2e"/>
  <rect x="44" y="20" width="8" height="40" fill="#1a1a2e"/>
  <rect x="54" y="26" width="6" height="34" fill="#1a1a2e"/>
  <!-- Windows -->
  <rect x="6" y="28" width="2" height="2" fill="#00f0ff" opacity="0.5"/>
  <rect x="6" y="34" width="2" height="2" fill="#b026ff" opacity="0.4"/>
  <rect x="6" y="40" width="2" height="2" fill="#00f0ff" opacity="0.3"/>
  <rect x="46" y="24" width="2" height="2" fill="#ff2d95" opacity="0.5"/>
  <rect x="46" y="30" width="2" height="2" fill="#00f0ff" opacity="0.4"/>
  <rect x="46" y="36" width="2" height="2" fill="#b026ff" opacity="0.3"/>
  <!-- Platforms -->
  <rect x="2" y="48" width="16" height="3" fill="#3a3a5c"/>
  <rect x="28" y="40" width="14" height="3" fill="#3a3a5c"/>
  <rect x="48" y="50" width="14" height="3" fill="#3a3a5c"/>
  <rect x="0" y="58" width="64" height="3" fill="#3a3a5c"/>
  <!-- Player character -->
  <rect x="10" y="41" width="6" height="6" fill="#00f0ff" rx="1"/>
  <rect x="11" y="42" width="4" height="4" fill="#00f0ff" rx="1"/>
  <rect x="12" y="43" width="2" height="2" fill="#0f0f1a"/>
  <!-- Running legs -->
  <rect x="10" y="47" width="2" height="3" fill="#00f0ff"/>
  <rect x="14" y="47" width="2" height="3" fill="#00f0ff"/>
  <!-- Coin -->
  <rect x="34" y="34" width="4" height="4" fill="#ffe600" rx="1">
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Stars -->
  <rect x="50" y="8" width="2" height="2" fill="#ffe600" opacity="0.6"/>
  <rect x="8" y="12" width="2" height="2" fill="#ffe600" opacity="0.4"/>
  <rect x="30" y="6" width="1" height="1" fill="#fff" opacity="0.5"/>
</svg>
